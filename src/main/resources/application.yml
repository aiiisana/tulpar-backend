spring:
  application:
    name: tulpar

  # ─── DataSource ─────────────────────────────────────────────────────────────
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:tulpar}
    username: ${DB_USER:tulpar}
    password: ${DB_PASSWORD:tulpar_secret}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  # ─── JPA / Hibernate ────────────────────────────────────────────────────────
  jpa:
    hibernate:
      ddl-auto: validate          # Flyway owns the schema; Hibernate only validates
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          time_zone: UTC

  # ─── Flyway ─────────────────────────────────────────────────────────────────
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  # ─── Redis ──────────────────────────────────────────────────────────────────
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:redis_secret}
      timeout: 2000ms

  # ─── Cache ──────────────────────────────────────────────────────────────────
  cache:
    type: redis
    redis:
      time-to-live: 600000        # 10 minutes default TTL (ms)

  # ─── Multipart (file uploads) ───────────────────────────────────────────────
  servlet:
    multipart:
      enabled: true
      max-file-size: 500MB
      max-request-size: 500MB

# ─── Server ─────────────────────────────────────────────────────────────────
server:
  port: 8080
  servlet:
    context-path: /api

# ─── Actuator ───────────────────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

# ─── Firebase ───────────────────────────────────────────────────────────────
firebase:
  service-account-path: ${FIREBASE_SERVICE_ACCOUNT_PATH:firebase-service-account.json}
  project-id: ${FIREBASE_PROJECT_ID:your-firebase-project-id}

# ─── MinIO ──────────────────────────────────────────────────────────────────
minio:
  endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
  access-key: ${MINIO_ACCESS_KEY:minio_admin}
  secret-key: ${MINIO_SECRET_KEY:minio_secret}
  bucket-name: ${MINIO_BUCKET:tulpar-media}
  presigned-url-expiry: 3600      # seconds — how long presigned GET URLs are valid

# ─── Logging ────────────────────────────────────────────────────────────────
logging:
  level:
    root: INFO
    kz.diploma.tulpar: DEBUG
    org.flywaydb: INFO
    org.hibernate.SQL: DEBUG
